services:
  mysql:
    image: mysql:8.0
    container_name: mysql_logistica
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: logistica_almacen_bd
      MYSQL_USER: logistica_user
      MYSQL_PASSWORD: secret
      TZ: America/Lima
    ports:
      - "3330:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_logistica
    restart: always
    ports:
      - "8008:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: logistica_user
      PMA_PASSWORD: secret
    depends_on:
      - mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_logistica
    restart: always
    environment:
      PORT: 3200
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: logistica_user
      DB_PASSWORD: secret
      DB_NAME: logistica_almacen_bd
      FRONTEND_URL: http://localhost
      JWT_SECRET: cambia_este_secreto_en_produccion
    ports:
      - "3200:3200"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_logistica
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
