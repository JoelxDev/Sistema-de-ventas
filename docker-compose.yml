# version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_logistica
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: logistica_almacen_bd
      MYSQL_USER: logistica_user
      MYSQL_PASSWORD: secret
      TZ: America/Lima
    ports:
      - "3330:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_logistica
    restart: always
    ports:
      - "8008:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: logistica_user
      PMA_PASSWORD: secret
    depends_on:
      - mysql

volumes:
  mysql_data:
